name: Run Tests & Update Dashboard

# Optional legacy workflow — disable schedule when VM cron is primary
on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-tests]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          BASE_URL=${{ secrets.BASE_URL }}
          LOGIN_URL=${{ secrets.LOGIN_URL }}
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}
          EXPERT_DASHBOARD_URL=${{ secrets.EXPERT_DASHBOARD_URL }}
          COPILOT_HOME_URL=${{ secrets.COPILOT_HOME_URL }}
          TEST_EMAIL=${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
          GOOGLE_APPS_SCRIPT_URL=${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          EMAIL_WEB_APP_URL=${{ secrets.EMAIL_WEB_APP_URL }}
          REPORT_RECIPIENTS=${{ secrets.REPORT_RECIPIENTS }}
          GOOGLE_SHEETS_URL=${{ secrets.GOOGLE_SHEETS_URL }}
          DASHBOARD_PAGES_URL=${{ secrets.DASHBOARD_PAGES_URL }}
          EOF

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate dashboard
        run: node scripts/generate-dashboard.js

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/history docs/exports docs/artifacts
          git diff --cached --quiet || git commit -m "Update dashboard data [skip ci]"
          git push || true

      - name: Send failure email
        run: node scripts/send-email-report.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            reports/
